name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./gradlew shadowJar

      - name: Build DEB
        run: |
          jpackage \
            --type deb \
            --name "JavaFX Live Preview" \
            --app-version 1.0.0 \
            --input build/libs \
            --main-jar javafx-live-preview.jar \
            --main-class com.javafxpreview.Main \
            --icon src/main/resources/icons/icon.png \
            --linux-package-name javafx-live-preview \
            --linux-shortcut \
            --linux-app-category Development \
            --dest build/dist

      - name: Build portable tar.gz
        run: |
          jpackage \
            --type app-image \
            --name JavaVisualizer \
            --app-version 1.0.0 \
            --input build/libs \
            --main-jar javafx-live-preview.jar \
            --main-class com.javafxpreview.Main \
            --icon src/main/resources/icons/icon.png \
            --dest build/app-image
          cd build/app-image
          tar -czf ../dist/JavaFXLivePreview-linux-x64.tar.gz JavaVisualizer

      - name: Rename artifacts
        run: |
          cd build/dist
          for f in *.deb; do mv "$f" "JavaFXLivePreview-linux-amd64.deb"; done
          cd ../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            build/dist/*.deb
            build/dist/*.tar.gz

  build-linux-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y rpm-build tar gzip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./gradlew shadowJar

      - name: Build RPM
        run: |
          jpackage \
            --type rpm \
            --name "javafx-live-preview" \
            --app-version 1.0.0 \
            --input build/libs \
            --main-jar javafx-live-preview.jar \
            --main-class com.javafxpreview.Main \
            --icon src/main/resources/icons/icon.png \
            --linux-package-name javafx-live-preview \
            --linux-shortcut \
            --linux-app-category Development \
            --dest build/dist

      - name: Rename artifacts
        run: |
          cd build/dist
          for f in *.rpm; do mv "$f" "JavaFXLivePreview-linux-x86_64.rpm"; done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: build/dist/*.rpm

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate .icns icon
        run: |
          mkdir -p icon.iconset
          sips -z 128 128 src/main/resources/icons/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 src/main/resources/icons/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 src/main/resources/icons/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 src/main/resources/icons/icon.png --out icon.iconset/icon_256x256@2x.png
          iconutil -c icns icon.iconset -o src/main/resources/icons/icon.icns

      - name: Build JAR
        run: ./gradlew shadowJar

      - name: Build DMG
        run: |
          jpackage \
            --type dmg \
            --name "JavaFX Live Preview" \
            --app-version 1.0.0 \
            --input build/libs \
            --main-jar javafx-live-preview.jar \
            --main-class com.javafxpreview.Main \
            --icon src/main/resources/icons/icon.icns \
            --dest build/dist

      - name: Rename artifacts
        run: |
          cd build/dist
          for f in *.dmg; do mv "$f" "JavaFXLivePreview-macos-arm64.dmg"; done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: build/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install WIX Toolset
        run: choco install wixtoolset -y

      - name: Generate .ico icon
        run: |
          choco install imagemagick.app -y
          magick src/main/resources/icons/icon.png -define icon:auto-resize=256,128,64,48,32,16 src/main/resources/icons/icon.ico

      - name: Build JAR
        run: ./gradlew shadowJar

      - name: Build MSI
        run: |
          jpackage --type msi --name "JavaFX Live Preview" --app-version 1.0.0 --input build/libs --main-jar javafx-live-preview.jar --main-class com.javafxpreview.Main --icon src/main/resources/icons/icon.ico --dest build/dist --win-shortcut --win-menu

      - name: Build EXE
        run: |
          jpackage --type exe --name "JavaFX Live Preview" --app-version 1.0.0 --input build/libs --main-jar javafx-live-preview.jar --main-class com.javafxpreview.Main --icon src/main/resources/icons/icon.ico --dest build/dist --win-shortcut --win-menu

      - name: Rename artifacts
        shell: bash
        run: |
          cd build/dist
          for f in *.msi; do mv "$f" "JavaFXLivePreview-windows-x64.msi"; done
          for f in *.exe; do mv "$f" "JavaFXLivePreview-windows-x64.exe"; done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            build/dist/*.msi
            build/dist/*.exe

  release:
    needs: [build-linux-deb, build-linux-rpm, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-deb/*.deb
            artifacts/linux-deb/*.tar.gz
            artifacts/linux-rpm/*.rpm
            artifacts/macos-arm64-dmg/*.dmg
            artifacts/windows-installers/*.msi
            artifacts/windows-installers/*.exe
          generate_release_notes: true
